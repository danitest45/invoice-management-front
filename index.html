<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-label="Snake game">
        <header class="panel__header">
          <div>
            <p class="eyebrow">Classic Arcade</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </header>

        <div class="status">
          <p id="status-text">Press any arrow key or WASD to start.</p>
          <div class="actions">
            <button id="pause-button" type="button">Pause</button>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </div>

        <div
          id="game-board"
          class="board"
          role="grid"
          aria-label="Snake board"
        ></div>

        <div class="controls" aria-label="Touch controls">
          <button type="button" data-direction="up" aria-label="Move up">Up</button>
          <div class="controls__row">
            <button type="button" data-direction="left" aria-label="Move left">Left</button>
            <button type="button" data-direction="down" aria-label="Move down">Down</button>
            <button type="button" data-direction="right" aria-label="Move right">Right</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./main.mjs"></script>
  </body>
</html>
